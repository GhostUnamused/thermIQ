<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ThermIQ — Query Copilot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"></script>
</head>
<body class="chat-page">
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">⚡ ThermIQ</div>
      <nav class="nav-links">
        <a href="index.html" class="active">Query Copilot</a>
        <a href="dashboard.html">Risk Dashboard</a>
      </nav>
      <button id="new-chat-btn" class="btn-ghost">+ New Chat</button>
    </div>
  </header>

  <main class="chat-main">
    <div id="chat-messages" class="chat-messages">
      <!-- Rendered by app.js — empty state shows chips -->
    </div>

    <div class="chat-input-area">
      <div id="suggestion-chips" class="chip-row">
        <button class="chip" data-query="What are the mandatory spares for a 500MW boiler per CEA spec?">Mandatory boiler spares</button>
        <button class="chip" data-query="Super heater tube failure emergency procedure">Superheater failure procedure</button>
        <button class="chip" data-query="BFP seal replacement steps">BFP seal replacement</button>
        <button class="chip" data-query="Turbine vibration trip thresholds">Turbine vibration limits</button>
      </div>
      <div class="input-row">
        <textarea
          id="chat-input"
          placeholder="Ask about boiler procedures, turbine specs, CEA compliance... (Ctrl+Enter to send)"
          rows="1"
        ></textarea>
        <button id="send-btn" class="btn-send" title="Send (Ctrl+Enter)">&#8594;</button>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    ThermIQ v0.1 | Qdrant + Gemini | Data: CEA Public Sources
  </footer>

  <script src="app.js"></script>
</body>
</html>
