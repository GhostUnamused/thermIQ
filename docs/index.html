<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ThermIQ — Query Copilot</title>
  <meta name="description" content="ThermIQ Query Copilot — AI-powered assistant for thermal power plant procedures, turbine specs, CEA compliance, and maintenance knowledge." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;450;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="shortcut icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"></script>
</head>
<body class="chat-page">
  <header class="site-header">
    <div class="header-inner">
      <div class="header-left">
        <button id="sidebar-toggle-btn" class="sidebar-toggle" aria-label="Toggle sidebar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
        <div class="logo">ThermIQ</div>
      </div>
      <nav class="nav-links">
        <a href="index.html" class="active">Query Copilot</a>
        <a href="dashboard.html">Risk Dashboard</a>
        <a href="documents.html">Documents</a>
      </nav>
      <div class="header-actions">
        <button id="print-transcript-btn" class="theme-toggle" aria-label="Print transcript" title="Print chat transcript">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
            <polyline points="6 9 6 2 18 2 18 9"></polyline>
            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
            <rect x="6" y="14" width="12" height="8"></rect>
          </svg>
        </button>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <div class="app-layout">
    <!-- Sidebar overlay for mobile -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Chat History Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>Chats</h2>
        <button id="new-chat-btn" class="btn-new-chat">New</button>
      </div>
      <div class="chat-list" id="chat-list">
        <!-- Populated by app.js -->
      </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="chat-main">
      <div id="chat-messages" class="chat-messages">
        <!-- Rendered by app.js — empty state shows chips -->
      </div>

      <div class="chat-input-area">
        <div class="client-bar">
          <span class="client-label">Knowledge base:</span>
          <select id="client-select" class="client-select">
            <option value="">All documents</option>
            <option value="ntpc">NTPC</option>
          </select>
        </div>
        <div id="suggestion-chips" class="chip-row">
          <button class="chip" data-query="What are the mandatory spares for a 500MW boiler per CEA spec?">Mandatory boiler spares</button>
          <button class="chip" data-query="Super heater tube failure emergency procedure">Superheater failure procedure</button>
          <button class="chip" data-query="BFP seal replacement steps">BFP seal replacement</button>
          <button class="chip" data-query="Turbine vibration trip thresholds">Turbine vibration limits</button>
        </div>
        <div class="input-row">
          <textarea
            id="chat-input"
            placeholder="Ask about boiler procedures, turbine specs, CEA compliance..."
            rows="1"
          ></textarea>
          <button id="send-btn" class="btn-send" title="Send (Ctrl+Enter)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <footer class="site-footer">
    ThermIQ v0.4 | Qdrant + Gemini | Data: CEA Public Sources
  </footer>

  <script src="app.js"></script>
</body>
</html>
