<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ThermIQ — Documents</title>
  <!-- This page was consolidated into the single-page app (task-040/043).
       The old anchors map to the new in-page views:
         #guideline-documents -> #/guideline (Guideline Documents view)
         #plant-documents     -> #/plant     (Plant Documents view)
         #add-document        -> #/plant     (upload lives in the Plant view)
       Kept as a redirect so old bookmarks and links keep working. -->
  <script>
    (function () {
      var h = location.hash;
      var target = '#/plant';
      if (h === '#guideline-documents') target = '#/guideline';
      location.replace('./index.html' + target);
    })();
  </script>
  <meta http-equiv="refresh" content="0; url=./index.html#/plant" />
</head>
<body>
  <p>Moved — continue to <a href="./index.html#/plant">ThermIQ Plant Documents</a> or <a href="./index.html#/guideline">Guideline Documents</a>.</p>
</body>
</html>
